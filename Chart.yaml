apiVersion: v2
name: data-platform
description: >
  Gehärtetes Open-Source Data Platform Umbrella Helm Chart.
  Komponenten: Vault, External Secrets Operator, PostgreSQL, MinIO, Keycloak,
  Airflow 3 + dbt, Trino, OpenMetadata, Superset, Metabase.
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - data-platform
  - airflow
  - trino
  - openmetadata
  - minio
maintainers:
  - name: Platform Team

# ============================================================
# DEPENDENCIES
# ============================================================
# Reihenfolge hier ist rein deklarativ (Helm installiert nicht in dieser
# Reihenfolge). Die tatsächliche Rollout-Reihenfolge steht in README.md:
# 001 -> 004 (Vault) -> 002 (PostgreSQL) -> 003 (MinIO) -> 010 (Keycloak)
# -> 005 (Airflow) -> 006 (Trino) -> 007 (OpenMetadata) -> 008 (Superset)
# -> 009 (Metabase) -> 011 (Tests) -> 012 (Doku)
dependencies:

  # --- TICKET-004: Secrets-Infrastruktur (muss zuerst stehen) ---
  - name: vault
    version: ">=0.28.0"
    repository: "https://helm.releases.hashicorp.com"
    condition: vault.enabled

  - name: external-secrets
    version: ">=0.9.0"
    repository: "https://charts.external-secrets.io"
    condition: external-secrets.enabled

  # --- TICKET-002 / TICKET-003: Storage-Layer ---
  # HINWEIS (s. CLAUDE.md, "Known Issues" #6): Bitnami hat das klassische
  # Repo charts.bitnami.com im Aug. 2025 abgelöst. Charts kommen jetzt aus
  # der OCI-Registry. Vor dem ersten `helm dependency update` unbedingt
  # `helm show chart oci://registry-1.docker.io/bitnamicharts/postgresql`
  # ausführen und die Version unten anpassen/pinnen.
  - name: postgresql
    version: ">=16.0.0"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled

  - name: minio
    version: ">=5.0.0"
    repository: "https://charts.min.io/"
    condition: minio.enabled

  # --- TICKET-010: Identity Provider ---
  # Gleicher Bitnami-OCI-Hinweis wie bei postgresql oben.
  - name: keycloak
    version: ">=22.0.0"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: keycloak.enabled

  # --- TICKET-005: Orchestrierung ---
  - name: airflow
    version: ">=1.0.0"
    repository: "https://airflow.apache.org"
    condition: airflow.enabled

  # --- TICKET-006: Query Engine ---
  - name: trino
    version: ">=1.0.0"
    repository: "https://trinodb.github.io/charts"
    condition: trino.enabled

  # --- TICKET-007: Governance ---
  - name: openmetadata
    version: ">=1.13.0"
    repository: "https://helm.open-metadata.org"
    condition: openmetadata.enabled

  # --- TICKET-008: BI (primär) ---
  - name: superset
    version: ">=0.12.0"
    repository: "https://apache.github.io/superset"
    condition: superset.enabled

  # --- TICKET-009: BI (ergänzend, optional) ---
  # TODO: Repository verifizieren. Es gibt kein offizielles Apache/Metabase-
  # Chart; in der Community kursieren mehrere (z.B. pmint93, geek-cookbook).
  # Vor TICKET-009 das aktuell gepflegteste Chart auswählen und hier eintragen.
  - name: metabase
    version: ">=1.0.0"
    repository: "https://pmint93.github.io/helm-charts"  # TODO verifizieren
    condition: metabase.enabled
