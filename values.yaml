# ============================================================
# GLOBALE WERTE (automatisch an alle Sub-Charts vererbt)
# ============================================================
# Helm reicht alles unter `global:` automatisch an jedes Sub-Chart als
# `.Values.global.*` weiter. Das ist der Mechanismus, über den z.B.
# `global.domain` und `global.storageClass` in den Komponenten-Values
# (values/*.yaml, siehe TICKET-002 ff.) referenziert werden.
#
# WICHTIG: values.yaml selbst wird NICHT durch die Helm-Template-Engine
# gerendert (nur templates/*.yaml werden gerendert). Platzhalter wie
# "{{ .Values.global.domain }}" funktionieren deshalb nur in Feldern, die
# der jeweilige Sub-Chart per `tpl` selbst nachrendert (z.B. Bitnami- und
# Trino-Charts tun das für ingress.hostname, extraEnvVars etc.). Wo das
# NICHT unterstützt wird, muss der Wert stattdessen direkt gesetzt oder
# per `--set` / eigenem Template injiziert werden. Bitte pro Sub-Chart
# in dessen README prüfen, bevor TICKET-002 ff. umgesetzt wird.
global:
  domain: "data-platform.example.com"   # ANPASSEN
  storageClass: "fast-ssd"              # ANPASSEN
  imageRegistry: "your-registry"        # ANPASSEN
  imagePullPolicy: "IfNotPresent"
  imagePullSecrets: []
  namespaceSuffix: ""                   # z.B. "-prod" / "-staging"

# ============================================================
# NETZWERK-POLICIES (Umbrella-Level)
# ============================================================
# Globales Flag zum Aktivieren/Deaktivieren aller NetworkPolicies.
# Setzt den "Deny by Default"-Baseline sowie komponenten-spezifische Policies.
# EMPFEHLUNG: In Production immer enabled: true
networkPolicies:
  enabled: true

# ============================================================
# GLOBALE SECURITY-DEFAULTS (BundesMessenger-Pattern)
# ============================================================
x-security-context: &defaultSecurityContext
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop: [ALL]
  seccompProfile:
    type: RuntimeDefault

x-pod-security: &defaultPodSecurityContext
  runAsNonRoot: true
  fsGroupChangePolicy: OnRootMismatch

# ============================================================
# VAULT (TICKET-004) – volle Konfiguration in values/vault.yaml
# ============================================================
vault:
  enabled: true
  # Details: values/vault.yaml (HA-Mode, Raft, IPC_LOCK-Capability etc.)

# ============================================================
# EXTERNAL SECRETS OPERATOR (TICKET-004)
# ============================================================
external-secrets:
  enabled: true
  # Details: values/external-secrets.yaml (ClusterSecretStore -> Vault)

# ============================================================
# MINIO
# ============================================================
minio:
  enabled: true
  mode: distributed
  replicas: 4
  podSecurityContext:
    <<: *defaultPodSecurityContext
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  securityContext:
    <<: *defaultSecurityContext
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 2000m, memory: 4Gi }
  persistence:
    enabled: true
    storageClass: "fast-ssd"   # MUSS synchron zu global.storageClass bleiben
    size: 500Gi
  # S3-Kompatibilität für späteren Wechsel (z.B. zu Ceph/Garage)
  # API-Endpoint bleibt gleich → Airflow/Trino/dbt müssen nicht angepasst werden

# ============================================================
# APACHE AIRFLOW
# ============================================================
airflow:
  enabled: true
  executor: KubernetesExecutor   # bevorzugt: kein dauerhafter Worker-Pool
  podSecurityContext:
    <<: *defaultPodSecurityContext
    runAsUser: 50000
    runAsGroup: 50000
    fsGroup: 50000
  securityContext:
    <<: *defaultSecurityContext
  webserver:
    securityContext:
      <<: *defaultSecurityContext
      readOnlyRootFilesystem: false   # Webserver schreibt Sessions
  scheduler:
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: 2000m, memory: 4Gi }
  # dbt läuft als eigenes Airflow-Image (Custom Image)
  images:
    airflow:
      repository: your-registry/airflow-dbt
      tag: "3.0-python3.12"
      # Enthält: apache-airflow + dbt-core + dbt-trino + dbt-postgres
  extraPipPackages:
    - "dbt-core>=1.9"
    - "dbt-trino>=1.9"
    - "dbt-postgres>=1.9"
    - "openmetadata-ingestion>=1.13"

# ============================================================
# POSTGRESQL
# ============================================================
postgresql:
  enabled: true
  architecture: replication
  primary:
    podSecurityContext:
      <<: *defaultPodSecurityContext
      runAsUser: 1001
      fsGroup: 1001
    containerSecurityContext:
      <<: *defaultSecurityContext
      readOnlyRootFilesystem: false   # PG schreibt WAL
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: 4000m, memory: 8Gi }
  auth:
    existingSecret: postgresql-credentials   # via ExternalSecrets
  # Separate Datenbanken für jede Komponente
  # KORREKTUR: "keycloak" fehlte hier ursprünglich, wird aber von
  # TICKET-010 (externalDatabase.database: keycloak) zwingend benötigt.
  initdbScripts:
    init.sql: |
      CREATE DATABASE airflow;
      CREATE DATABASE openmetadata;
      CREATE DATABASE metabase;
      CREATE DATABASE superset;
      CREATE DATABASE keycloak;
      -- Vollständige Anlage von Usern + GRANTs (least privilege,
      -- ein User pro DB, kein SUPERUSER) erfolgt im Rahmen von TICKET-002.

# ============================================================
# TRINO (TICKET-006) – volle Konfiguration in values/trino.yaml
# ============================================================
# Distributed SQL Query Engine mit Coordinator + 3 Worker.
# Kataloge: Hive (MinIO/S3), Iceberg, PostgreSQL.
# Details siehe values/trino.yaml
trino:
  enabled: true

  server:
    workers: 3

  jvm:
    maxHeapSize: "6G"
    gcMethod:
      type: "UseG1GC"
      g1:
        heapRegionSize: "32M"

  config:
    query:
      maxMemory: "5GB"
      maxMemoryPerNode: "2GB"
      maxTotalMemoryPerNode: "3GB"
    task:
      maxWorkerThreads: 8
    spillEnabled: true
    spillPath: /tmp/trino-spill
    spillOrder: "ORDER_BY"
    spillWindowOperator: true

  coordinator:
    replicas: 1
    podSecurityContext:
      <<: *defaultPodSecurityContext
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    securityContext:
      <<: *defaultSecurityContext
      # AUSNAHME: readOnlyRootFilesystem deaktiviert.
      # Grund: Trino Coordinator schreibt Query-History und temporäre Dateien.
      # Mitigiert durch: emptyDir für /tmp/trino-spill, NetworkPolicy.
      readOnlyRootFilesystem: false
    resources:
      requests: { cpu: 1000m, memory: 2Gi }
      limits:   { cpu: 4000m, memory: 8Gi }
    extraVolumes:
      - name: trino-spill
        emptyDir: {}
    extraVolumeMounts:
      - name: trino-spill
        mountPath: /tmp/trino-spill

  worker:
    replicas: 3
    podSecurityContext:
      <<: *defaultPodSecurityContext
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    securityContext:
      <<: *defaultSecurityContext
      # AUSNAHME: readOnlyRootFilesystem deaktiviert.
      # Grund: Trino Worker benötigt Spill-to-Disk bei großen Queries.
      # Mitigiert durch: emptyDir für /tmp/trino-spill, NetworkPolicy.
      readOnlyRootFilesystem: false
    resources:
      requests: { cpu: 2000m, memory: 4Gi }
      limits:   { cpu: 8000m, memory: 16Gi }
    extraVolumes:
      - name: trino-spill
        emptyDir: {}
    extraVolumeMounts:
      - name: trino-spill
        mountPath: /tmp/trino-spill

  catalogs:
    # --- Hive Catalog (MinIO/S3) ---
    minio.properties: |
      connector.name=hive
      hive.metastore=file
      hive.metastore.catalog.dir=s3://data-raw/
      hive.s3.endpoint=http://{{ .Release.Name }}-minio:9000
      hive.s3.path-style-access=true
      hive.s3.ssl.enabled=false
      hive.s3.aws-credentials-provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

    # --- Iceberg Catalog (zukunftssicher) ---
    iceberg.properties: |
      connector.name=iceberg
      iceberg.catalog.type=hive_metastore
      hive.metastore=file
      hive.metastore.catalog.dir=s3://data-processed/
      hive.s3.endpoint=http://{{ .Release.Name }}-minio:9000
      hive.s3.path-style-access=true
      hive.s3.ssl.enabled=false

    # --- PostgreSQL Catalog ---
    postgresql.properties: |
      connector.name=postgresql
      connection-url=jdbc:postgresql://{{ .Release.Name }}-postgresql:5432/
      connection-user=${ENV:TRINO_PG_USER}
      connection-password=${ENV:TRINO_PG_PASSWORD}

  # --- Credentials via ExternalSecret (nicht in Plain-Text!) ---
  env:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: trino-minio-credentials
          key: access-key
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: trino-minio-credentials
          key: secret-key
    - name: TRINO_PG_USER
      valueFrom:
        secretKeyRef:
          name: trino-pg-credentials
          key: username
    - name: TRINO_PG_PASSWORD
      valueFrom:
        secretKeyRef:
          name: trino-pg-credentials
          key: password

  service:
    type: ClusterIP
    port: 8080

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

# ============================================================
# KEYCLOAK (TICKET-010) – volle Konfiguration in values/keycloak.yaml
# ============================================================
# Keycloak als zentraler Identity Provider (IdP) für SSO via OIDC.
# ADR-005: Keycloak ist der einzige IdP für alle Stack-Komponenten.
# Details siehe values/keycloak.yaml
keycloak:
  enabled: true

  auth:
    adminUser: admin
    existingSecret: keycloak-credentials
    existingSecretKey: admin-password

  podSecurityContext:
    <<: *defaultPodSecurityContext
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  containerSecurityContext:
    <<: *defaultSecurityContext
    # AUSNAHME: readOnlyRootFilesystem deaktiviert.
    # Grund: Keycloak schreibt temporäre Provider-Dateien, Logs.
    # Mitigiert durch: emptyDir für /tmp, restriktive NetworkPolicy.
    readOnlyRootFilesystem: false

  extraVolumes:
    - name: tmp
      emptyDir: {}

  extraVolumesFromConfigMaps:
    - name: realm-config
      configMap:
        name: "{{ .Release.Name }}-keycloak-realm"

  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: realm-config
      mountPath: /opt/bitnami/keycloak/data/import
      readOnly: true

  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 2000m, memory: 2Gi }

  extraStartupArgs: "--import-realm"

  postgresql:
    enabled: false

  externalDatabase:
    type: postgresql
    host: "{{ .Release.Name }}-postgresql"
    port: 5432
    database: keycloak
    username: keycloak
    existingSecret: keycloak-db-credentials
    existingSecretPasswordKey: password

  replicaCount: 2

  cache:
    enabled: true
    stackName: kubernetes

  service:
    type: ClusterIP
    port: 8080

  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: "auth.{{ .Values.global.domain }}"
    tls: true
    selfSigned: false
    extraTls:
      - hosts:
          - "auth.{{ .Values.global.domain }}"
        secretName: keycloak-tls

# ============================================================
# OPENMETADATA (TICKET-007) – volle Konfiguration in values/openmetadata.yaml
# ============================================================
# Data Catalog & Governance Platform.
# ADR-001: OM-eigenes Airflow deaktiviert; nutzt eigenständiges Airflow (TICKET-005) per REST-API.
# Details siehe values/openmetadata.yaml
openmetadata:
  enabled: true

  # ADR-001: Airflow-Dependency deaktivieren
  airflow:
    enabled: false

  podSecurityContext:
    <<: *defaultPodSecurityContext
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  securityContext:
    <<: *defaultSecurityContext
    # AUSNAHME: readOnlyRootFilesystem deaktiviert.
    # Grund: OM schreibt temporäre Dateien, Logs, Search-Indizes.
    # Mitigiert durch: emptyDir für /tmp, NetworkPolicy.
    readOnlyRootFilesystem: false

  extraVolumes:
    - name: tmp
      emptyDir: {}
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp

  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 2000m, memory: 4Gi }

  replicaCount: 1

  config:
    database:
      host: "{{ .Release.Name }}-postgresql"
      port: 5432
      driverClass: "org.postgresql.Driver"
      dbScheme: "postgresql"
      dbUseSSL: false
      databaseName: openmetadata
      existingSecret: openmetadata-db-credentials
      existingSecretPasswordKey: password

  pipelineServiceClientConfig:
    enabled: true
    className: "org.openmetadata.service.clients.pipeline.airflow.AirflowRESTClient"
    apiEndpoint: "http://{{ .Release.Name }}-airflow-webserver:8080"
    metadataApiEndpoint: "http://{{ .Release.Name }}-openmetadata:8585/api"
    verifySSL: false
    secretsManagerCredentials:
      existingSecret: openmetadata-airflow-credentials
      existingSecretKey: api-token

  authentication:
    provider: "custom-oidc"
    publicKeyUrls:
      - "https://{{ .Values.global.domain }}/auth/realms/data-platform/protocol/openid-connect/certs"
    authority: "https://{{ .Values.global.domain }}/auth/realms/data-platform"
    clientId: "openmetadata"
    callbackUrl: "https://catalog.{{ .Values.global.domain }}/callback"
    enableSelfSignup: false

  authorizer:
    initialAdmins:
      - "admin"
    principalDomain: "{{ .Values.global.domain }}"

  elasticsearch:
    enabled: true

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    hosts:
      - host: "catalog.{{ .Values.global.domain }}"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: openmetadata-tls
        hosts:
          - "catalog.{{ .Values.global.domain }}"

  service:
    type: ClusterIP
    port: 8585

# ============================================================
# APACHE SUPERSET (TICKET-008) – volle Konfiguration in values/superset.yaml
# ============================================================
# Primäres BI-Tool (bevorzugt gegenüber Metabase für OSS).
# - Webserver (2 Replicas) + Celery Worker (2) für async Queries
# - Keycloak OIDC für SSO
# - Redis als Celery Broker
# - Trino als vorkonfigurierte Datenquelle
# Details siehe values/superset.yaml
superset:
  enabled: true

  replicaCount: 2

  podSecurityContext:
    <<: *defaultPodSecurityContext
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  securityContext:
    <<: *defaultSecurityContext
    # AUSNAHME: readOnlyRootFilesystem deaktiviert.
    # Grund: Superset schreibt Flask-Sessions, Jinja-Cache, Chart-Exports.
    # Mitigiert durch: emptyDir für /tmp und /home/superset, NetworkPolicy.
    readOnlyRootFilesystem: false

  extraVolumes:
    - name: tmp
      emptyDir: {}
    - name: home
      emptyDir: {}

  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: home
      mountPath: /home/superset

  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 2000m, memory: 4Gi }

  supersetNode:
    connections:
      db_host: "{{ .Release.Name }}-postgresql"
      db_port: 5432
      db_name: superset
      db_user: superset
      db_pass: ""

  extraSecretEnv:
    SUPERSET_SECRET_KEY:
      secretName: superset-credentials
      secretKey: secret-key
    SUPERSET_DATABASE_PASSWORD:
      secretName: superset-db-credentials
      secretKey: password

  extraEnv:
    - name: SUPERSET_KEYCLOAK_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: superset-oidc-credentials
          key: client-secret

  configOverrides:
    oidc_auth: |
      from flask_appbuilder.security.manager import AUTH_OAUTH
      AUTH_TYPE = AUTH_OAUTH
      OAUTH_PROVIDERS = [{
        "name": "keycloak",
        "icon": "fa-key",
        "token_key": "access_token",
        "remote_app": {
          "client_id": "superset",
          "client_secret": "{{ env(\"SUPERSET_KEYCLOAK_CLIENT_SECRET\") }}",
          "server_metadata_url": "https://{{ .Values.global.domain }}/auth/realms/data-platform/.well-known/openid-configuration",
          "client_kwargs": {"scope": "openid email profile"},
        }
      }]
      AUTH_USER_REGISTRATION = True
      AUTH_USER_REGISTRATION_ROLE = "Gamma"
      AUTH_ROLES_MAPPING = {
        "superset-admin": ["Admin"],
        "superset-analyst": ["Alpha"],
        "superset-viewer": ["Gamma"],
      }
      AUTH_ROLES_SYNC_AT_LOGIN = True

  init:
    initscript: |
      #!/bin/bash
      set -e
      echo "Initializing Superset..."
      superset db upgrade
      superset init
      echo "Adding Trino datasource..."
      superset set-database-uri \
        --database-name "Trino (Data Platform)" \
        --uri "trino://trino-user@{{ .Release.Name }}-trino:8080/iceberg" || true
      echo "Superset initialized successfully"

  celeryWorker:
    enabled: true
    replicaCount: 2
    podSecurityContext:
      <<: *defaultPodSecurityContext
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    securityContext:
      <<: *defaultSecurityContext
      readOnlyRootFilesystem: false
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: 2000m, memory: 4Gi }

  redis:
    enabled: true
    master:
      podSecurityContext:
        <<: *defaultPodSecurityContext
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containerSecurityContext:
        <<: *defaultSecurityContext
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits:   { cpu: 500m, memory: 512Mi }

  service:
    type: ClusterIP
    port: 8088

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: "bi.{{ .Values.global.domain }}"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: superset-tls
        hosts:
          - "bi.{{ .Values.global.domain }}"

# ============================================================
# METABASE (TICKET-009) – volle Konfiguration in values/metabase.yaml
# ============================================================
# Ergänzendes Self-Service BI-Tool.
# ADR-004: oauth2-proxy als Sidecar für Keycloak SSO (Metabase OSS kein natives OIDC).
# Details siehe values/metabase.yaml
metabase:
  enabled: true

  podSecurityContext:
    <<: *defaultPodSecurityContext
    runAsUser: 2000
    runAsGroup: 2000
    fsGroup: 2000

  securityContext:
    <<: *defaultSecurityContext
    # AUSNAHME: readOnlyRootFilesystem deaktiviert.
    # Grund: Metabase schreibt temporäre Dateien, Logs, H2-Fallback-DB.
    # Mitigiert durch: emptyDir für /tmp, oauth2-proxy als Auth-Barrier.
    readOnlyRootFilesystem: false

  extraVolumes:
    - name: tmp
      emptyDir: {}

  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp

  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 2000m, memory: 4Gi }

  replicaCount: 1

  database:
    type: postgres
    host: "{{ .Release.Name }}-postgresql"
    port: 5432
    dbname: metabase
    existingSecret: metabase-db-credentials
    existingSecretUsernameKey: username
    existingSecretPasswordKey: password

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: false

  extraEnv:
    - name: MB_ENCRYPTION_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: metabase-credentials
          key: encryption-key
