{{- if and .Values.superset.enabled .Values."external-secrets".enabled }}
# ============================================================
# TICKET-008: Superset Secrets (via ExternalSecret Operator)
# ============================================================
# Liest Credentials aus Vault und erstellt K8s Secrets.
# Wird durch den ESO-ClusterSecretStore automatisch reconciliert.
# ============================================================

---
# ============================================================
# Superset Core Credentials (SECRET_KEY)
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-superset-credentials
  namespace: {{ .Values.namespaces.analytics }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: superset
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: superset-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/component: superset
  data:
    # Vault-Pfad: secret/data-platform/superset/secret-key
    - secretKey: secret-key
      remoteRef:
        key: secret/data-platform/superset/secret-key
        property: key

---
# ============================================================
# PostgreSQL Credentials (Superset App-DB)
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-superset-db-credentials
  namespace: {{ .Values.namespaces.analytics }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: superset
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: superset-db-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/component: superset
  data:
    # Vault-Pfad: secret/data-platform/postgresql/superset-user
    - secretKey: username
      remoteRef:
        key: secret/data-platform/postgresql/superset-user
        property: username

    - secretKey: password
      remoteRef:
        key: secret/data-platform/postgresql/superset-user
        property: password

---
# ============================================================
# Keycloak OIDC Client Secret
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-superset-oidc-credentials
  namespace: {{ .Values.namespaces.analytics }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: superset
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: superset-oidc-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/component: superset
  data:
    # Vault-Pfad: secret/data-platform/keycloak/superset-client-secret
    # WICHTIG: Keycloak-Client wird in TICKET-010 angelegt; Client-Secret in Vault hinterlegen.
    - secretKey: client-secret
      remoteRef:
        key: secret/data-platform/keycloak/superset-client-secret
        property: secret

{{- end }}
