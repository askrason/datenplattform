{{- if and .Values.vault.enabled .Values.external-secrets.enabled }}
# ClusterSecretStore: Vault Backend für External Secrets Operator
# ============================================================
# Dies ist ein ClusterSecretStore (nicht SecretStore), daher in allen
# Namespaces verfügbar. ESO authentifiziert sich via Kubernetes Auth
# (Vault liest K8s ServiceAccount Token von ESO's ServiceAccount).
#
# Vault-Struktur: secret/data-platform/<komponente>/<key>
# KV-v2-spezifisches "data/"-Segment wird von ESO automatisch ergänzt.

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ include "data-platform.fullname" . }}-vault-backend
  labels:
    {{- include "data-platform.labels" . | nindent 4 }}
    component: external-secrets

spec:
  provider:
    vault:
      # Vault Server Endpoint (interner Service)
      server: "http://{{ .Release.Name }}-vault:8200"

      # KV Engine Path
      path: "secret"

      # KV Engine Version (v2 = neueres Format mit metadata/data-Struktur)
      version: "v2"

      # ============================================================
      # Kubernetes Authentication Method
      # ============================================================
      # Vault authentifiziert ESO via Kubernetes ServiceAccount Token.
      # Der Token wird automatisch von kubelet in das Pod gemountet.
      auth:
        kubernetes:
          # Vault Kubernetes Auth Mount Path
          mountPath: "kubernetes"

          # Vault Rolle (muss manuell erstellt werden, siehe vault-setup.md)
          role: "external-secrets-operator"

          # ServiceAccount, dessen Token Vault validiert
          serviceAccountRef:
            name: external-secrets
            namespace: "{{ .Release.Namespace }}"
{{- end }}
