{{- if and .Values.postgresql.enabled .Values.external-secrets.enabled }}
# ExternalSecret: PostgreSQL Credentials
# ============================================================
# ESO synchronisiert folgende Secrets aus Vault
# (Pfad: secret/data-platform/postgresql) zu einem K8s Secret:
#   - postgres-password (Root-User)
#   - airflow-password
#   - openmetadata-password
#   - superset-password
#   - metabase-password
#   - keycloak-password
#
# Das resultierende K8s Secret wird als "postgresql-credentials"
# benannt und von verschiedenen Komponenten referenziert.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "data-platform.fullname" . }}-postgresql-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "data-platform.labels" . | nindent 4 }}
    component: postgresql

spec:
  # SecretStore Reference (ClusterSecretStore, defined in TICKET-004)
  secretStoreRef:
    name: {{ include "data-platform.fullname" . }}-vault-backend
    kind: ClusterSecretStore

  # Target K8s Secret
  target:
    name: postgresql-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          {{- include "data-platform.labels" . | nindent 10 }}
          component: postgresql

  # Daten aus Vault lesen
  data:
    # Root Password (postgres user)
    - secretKey: postgres-password
      remoteRef:
        key: postgresql/root-password

    # Airflow DB Password
    - secretKey: airflow-password
      remoteRef:
        key: postgresql/airflow-password

    # OpenMetadata DB Password
    - secretKey: openmetadata-password
      remoteRef:
        key: postgresql/openmetadata-password

    # Superset DB Password
    - secretKey: superset-password
      remoteRef:
        key: postgresql/superset-password

    # Metabase DB Password
    - secretKey: metabase-password
      remoteRef:
        key: postgresql/metabase-password

    # Keycloak DB Password
    - secretKey: keycloak-password
      remoteRef:
        key: postgresql/keycloak-password

  # Refresh-Interval: alle Stunde
  refreshInterval: 1h
{{- end }}
