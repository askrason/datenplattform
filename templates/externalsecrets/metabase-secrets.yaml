{{- if and .Values.metabase.enabled .Values."external-secrets".enabled }}
# ============================================================
# TICKET-009: Metabase Secrets (via ExternalSecret Operator)
# ============================================================
# Liest Credentials aus Vault und erstellt K8s Secrets.
# Wird durch den ESO-ClusterSecretStore automatisch reconciliert.
# ============================================================

---
# ============================================================
# Metabase Encryption Key + Credentials
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-metabase-credentials
  namespace: {{ .Values.namespaces.analytics }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: metabase
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "data-platform.fullname" . }}-vault-backend
    kind: ClusterSecretStore
  target:
    name: metabase-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/component: metabase
  data:
    # Vault-Pfad: secret/data-platform/metabase/encryption-key
    - secretKey: encryption-key
      remoteRef:
        key: secret/data-platform/metabase/encryption-key
        property: key

---
# ============================================================
# PostgreSQL Credentials (Metabase App-DB)
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-metabase-db-credentials
  namespace: {{ .Values.namespaces.analytics }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: metabase
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "data-platform.fullname" . }}-vault-backend
    kind: ClusterSecretStore
  target:
    name: metabase-db-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/component: metabase
  data:
    # Vault-Pfad: secret/data-platform/postgresql/metabase-user
    - secretKey: username
      remoteRef:
        key: secret/data-platform/postgresql/metabase-user
        property: username

    - secretKey: password
      remoteRef:
        key: secret/data-platform/postgresql/metabase-user
        property: password

---
# ============================================================
# oauth2-proxy OIDC Credentials (Keycloak Client)
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-metabase-oidc-credentials
  namespace: {{ .Values.namespaces.analytics }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: metabase
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "data-platform.fullname" . }}-vault-backend
    kind: ClusterSecretStore
  target:
    name: metabase-oidc-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/component: metabase
  data:
    # Vault-Pfad: secret/data-platform/keycloak/metabase-client-secret
    - secretKey: client-secret
      remoteRef:
        key: secret/data-platform/keycloak/metabase-client-secret
        property: secret

    # Vault-Pfad: secret/data-platform/metabase/cookie-secret
    # Cookie Secret generieren: openssl rand -base64 32 | tr -- '+/' '-_'
    - secretKey: cookie-secret
      remoteRef:
        key: secret/data-platform/metabase/cookie-secret
        property: secret

{{- end }}
