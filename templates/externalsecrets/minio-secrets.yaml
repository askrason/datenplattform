{{- if and .Values.minio.enabled .Values.external-secrets.enabled }}
# ExternalSecret: MinIO Credentials
# ============================================================
# ESO synchronisiert folgende Secrets aus Vault
# (Pfad: secret/data-platform/minio) zu einem K8s Secret:
#   - root-user (Root-User für MinIO Admin)
#   - root-password
#   - airflow-secret-key (für airflow-svc User)
#   - trino-secret-key (für trino-svc User)
#   - openmetadata-secret-key (für openmetadata-svc User)
#
# Das resultierende K8s Secret wird als "minio-credentials" benannt.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "data-platform.fullname" . }}-minio-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "data-platform.labels" . | nindent 4 }}
    component: minio

spec:
  # SecretStore Reference (ClusterSecretStore, defined in TICKET-004)
  secretStoreRef:
    name: {{ include "data-platform.fullname" . }}-vault-backend
    kind: ClusterSecretStore

  # Target K8s Secret
  target:
    name: minio-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          {{- include "data-platform.labels" . | nindent 10 }}
          component: minio

  # Daten aus Vault lesen
  data:
    # Root User (MinIO Admin)
    - secretKey: root-user
      remoteRef:
        key: minio/root-user

    # Root Password
    - secretKey: root-password
      remoteRef:
        key: minio/root-password

    # Airflow Service User Secret Key
    - secretKey: airflow-secret-key
      remoteRef:
        key: minio/airflow-secret-key

    # Trino Service User Secret Key
    - secretKey: trino-secret-key
      remoteRef:
        key: minio/trino-secret-key

    # OpenMetadata Service User Secret Key
    - secretKey: openmetadata-secret-key
      remoteRef:
        key: minio/openmetadata-secret-key

  # Refresh-Interval: alle Stunde
  refreshInterval: 1h
{{- end }}
