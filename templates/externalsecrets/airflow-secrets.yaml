{{- if and .Values.airflow.enabled .Values.external-secrets.enabled }}
# ExternalSecret: Airflow Credentials
# ============================================================
# ESO synchronisiert folgende Secrets aus Vault:
#   1. airflow-credentials: fernet-key, webserver-secret-key
#   2. airflow-db-credentials: PostgreSQL password
#   3. airflow-minio-credentials: MinIO access/secret keys
#   4. airflow-oidc-credentials: Keycloak client secret
#
# Diese Secrets werden als K8s Secrets erstellt und von
# Airflow (Webserver, Scheduler, Worker) referenziert.

---
# ExternalSecret 1: Airflow Core Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "data-platform.fullname" . }}-airflow-credentials
  namespace: {{ .Values.namespaces.compute }}
  labels:
    {{- include "data-platform.labels" . | nindent 4 }}
    component: airflow

spec:
  secretStoreRef:
    name: {{ include "data-platform.fullname" . }}-vault-backend
    kind: ClusterSecretStore

  target:
    name: airflow-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          {{- include "data-platform.labels" . | nindent 10 }}
          component: airflow

  data:
    # Fernet Key (für Airflow Variable/Connection Encryption)
    - secretKey: fernet-key
      remoteRef:
        key: airflow/fernet-key

    # Webserver Secret Key (für Session-Encryption)
    - secretKey: webserver-secret-key
      remoteRef:
        key: airflow/webserver-secret-key

  refreshInterval: 1h

---
# ExternalSecret 2: Database Credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "data-platform.fullname" . }}-airflow-db-credentials
  namespace: {{ .Values.namespaces.compute }}
  labels:
    {{- include "data-platform.labels" . | nindent 4 }}
    component: airflow

spec:
  secretStoreRef:
    name: {{ include "data-platform.fullname" . }}-vault-backend
    kind: ClusterSecretStore

  target:
    name: airflow-db-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          {{- include "data-platform.labels" . | nindent 10 }}
          component: airflow

  data:
    - secretKey: password
      remoteRef:
        key: postgresql/airflow-password

  refreshInterval: 1h

---
# ExternalSecret 3: MinIO S3 Credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "data-platform.fullname" . }}-airflow-minio-credentials
  namespace: {{ .Values.namespaces.compute }}
  labels:
    {{- include "data-platform.labels" . | nindent 4 }}
    component: airflow

spec:
  secretStoreRef:
    name: {{ include "data-platform.fullname" . }}-vault-backend
    kind: ClusterSecretStore

  target:
    name: airflow-minio-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          {{- include "data-platform.labels" . | nindent 10 }}
          component: airflow

  data:
    - secretKey: access-key
      remoteRef:
        key: minio/airflow-secret-key

    - secretKey: secret-key
      remoteRef:
        key: minio/airflow-secret-key

  refreshInterval: 1h

---
# ExternalSecret 4: Keycloak OIDC Client Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "data-platform.fullname" . }}-airflow-oidc-credentials
  namespace: {{ .Values.namespaces.compute }}
  labels:
    {{- include "data-platform.labels" . | nindent 4 }}
    component: airflow

spec:
  secretStoreRef:
    name: {{ include "data-platform.fullname" . }}-vault-backend
    kind: ClusterSecretStore

  target:
    name: airflow-oidc-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          {{- include "data-platform.labels" . | nindent 10 }}
          component: airflow

  data:
    - secretKey: client-secret
      remoteRef:
        key: keycloak/airflow-client-secret

  refreshInterval: 1h

{{- end }}
