{{- if and .Values.trino.enabled .Values."external-secrets".enabled }}
# ============================================================
# TICKET-006: Trino Secrets (via ExternalSecret Operator)
# ============================================================
# Liest Credentials aus Vault und erstellt K8s Secrets.
# Wird durch den ESO-ClusterSecretStore automatisch reconciliert.
# ============================================================

---
# ============================================================
# MinIO / S3 Credentials (für Hive & Iceberg Katalog)
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-trino-minio-credentials
  namespace: {{ .Values.namespaces.compute }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: trino
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "data-platform.fullname" . }}-vault-backend
    kind: ClusterSecretStore
  target:
    name: trino-minio-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/component: trino
  data:
    # Vault-Pfad: secret/data-platform/minio/trino-service-user
    - secretKey: access-key
      remoteRef:
        key: secret/data-platform/minio/trino-service-user
        property: access-key

    - secretKey: secret-key
      remoteRef:
        key: secret/data-platform/minio/trino-service-user
        property: secret-key

---
# ============================================================
# PostgreSQL Credentials (für PostgreSQL-Katalog)
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-trino-pg-credentials
  namespace: {{ .Values.namespaces.compute }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: trino
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "data-platform.fullname" . }}-vault-backend
    kind: ClusterSecretStore
  target:
    name: trino-pg-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/component: trino
  data:
    # Vault-Pfad: secret/data-platform/postgresql/trino-user
    # WICHTIG: Der PostgreSQL-User "trino" muss in TICKET-002
    # (PostgreSQL initdbScripts) erstellt werden.
    - secretKey: username
      remoteRef:
        key: secret/data-platform/postgresql/trino-user
        property: username

    - secretKey: password
      remoteRef:
        key: secret/data-platform/postgresql/trino-user
        property: password

{{- end }}
