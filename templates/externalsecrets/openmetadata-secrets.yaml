{{- if and .Values.openmetadata.enabled .Values."external-secrets".enabled }}
# ============================================================
# TICKET-007: OpenMetadata Secrets (via ExternalSecret Operator)
# ============================================================
# Liest Credentials aus Vault und erstellt K8s Secrets.
# Wird durch den ESO-ClusterSecretStore automatisch reconciliert.
# ============================================================

---
# ============================================================
# PostgreSQL Credentials (OpenMetadata Metastore)
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-openmetadata-db-credentials
  namespace: {{ .Values.namespaces.compute }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: openmetadata
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "data-platform.fullname" . }}-vault-backend
    kind: ClusterSecretStore
  target:
    name: openmetadata-db-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/component: openmetadata
  data:
    # Vault-Pfad: secret/data-platform/postgresql/openmetadata-user
    - secretKey: username
      remoteRef:
        key: secret/data-platform/postgresql/openmetadata-user
        property: username

    - secretKey: password
      remoteRef:
        key: secret/data-platform/postgresql/openmetadata-user
        property: password

---
# ============================================================
# Airflow REST API Token (für Pipeline-Metadaten-Ingestion)
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-openmetadata-airflow-credentials
  namespace: {{ .Values.namespaces.compute }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: openmetadata
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "data-platform.fullname" . }}-vault-backend
    kind: ClusterSecretStore
  target:
    name: openmetadata-airflow-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/component: openmetadata
  data:
    # Vault-Pfad: secret/data-platform/openmetadata/airflow-api-token
    # WICHTIG: Token wird in Airflow-Admin-UI generiert und in Vault hinterlegt.
    - secretKey: api-token
      remoteRef:
        key: secret/data-platform/openmetadata/airflow-api-token
        property: token

---
# ============================================================
# Keycloak OIDC Client Secret (für SSO)
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-openmetadata-oidc-credentials
  namespace: {{ .Values.namespaces.compute }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: openmetadata
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "data-platform.fullname" . }}-vault-backend
    kind: ClusterSecretStore
  target:
    name: openmetadata-oidc-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/component: openmetadata
  data:
    # Vault-Pfad: secret/data-platform/keycloak/openmetadata-client-secret
    # WICHTIG: Keycloak-Client wird in TICKET-010 anlegt; Client-Secret in Vault speichern.
    - secretKey: client-secret
      remoteRef:
        key: secret/data-platform/keycloak/openmetadata-client-secret
        property: secret

{{- end }}
