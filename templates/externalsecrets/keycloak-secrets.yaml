{{- if and .Values.keycloak.enabled .Values."external-secrets".enabled }}
# ============================================================
# TICKET-010: Keycloak Secrets (via ExternalSecret Operator)
# ============================================================
# Liest Credentials aus Vault und erstellt K8s Secrets.
# Wird durch den ESO-ClusterSecretStore automatisch reconciliert.
# ============================================================

---
# ============================================================
# Keycloak Admin-Passwort
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-keycloak-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/component: keycloak
  data:
    # Vault-Pfad: secret/data-platform/keycloak/admin-password
    - secretKey: admin-password
      remoteRef:
        key: secret/data-platform/keycloak/admin-password
        property: password

---
# ============================================================
# PostgreSQL Credentials (Keycloak-Datenbank)
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-keycloak-db-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-db-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/component: keycloak
  data:
    # Vault-Pfad: secret/data-platform/postgresql/keycloak-user
    - secretKey: password
      remoteRef:
        key: secret/data-platform/postgresql/keycloak-user
        property: password

{{- end }}
