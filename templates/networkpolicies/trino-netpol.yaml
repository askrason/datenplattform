{{- if .Values.networkPolicies.enabled }}
# ============================================================
# TICKET-006: Trino NetworkPolicy
# ============================================================
# Erlaubt minimale Pod-to-Pod-Kommunikation:
# - Ingress: Coordinator Port 8080 von Superset, Metabase, OpenMetadata, Airflow-Worker
# - Worker: Ingress nur vom Coordinator (Cluster-interne Kommunikation)
# - Egress: MinIO (9000), PostgreSQL (5432), DNS (53), Coordinator ↔ Worker
# ============================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-trino-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: trino
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: trino
  policyTypes:
    - Ingress
    - Egress

  # ============================================================
  # INGRESS: Wer darf mit Trino sprechen?
  # ============================================================
  ingress:
    # --- Superset → Trino (BI Queries) ---
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: superset
      ports:
        - protocol: TCP
          port: 8080

    # --- Metabase → Trino (BI Queries) ---
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: metabase
      ports:
        - protocol: TCP
          port: 8080

    # --- OpenMetadata → Trino (Metadaten-Crawling) ---
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: openmetadata
      ports:
        - protocol: TCP
          port: 8080

    # --- Airflow Worker → Trino (DAG-Queries über dbt-trino) ---
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: airflow
              component: worker
      ports:
        - protocol: TCP
          port: 8080

    # --- Trino Coordinator ↔ Worker (interne Cluster-Kommunikation) ---
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: trino
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081

    # --- Optional: Ingress Controller (für Trino UI) ---
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080

  # ============================================================
  # EGRESS: Wohin darf Trino verbindungen herstellen?
  # ============================================================
  egress:
    # --- DNS Queries (Port 53) ---
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

    # --- MinIO (S3 / Hive / Iceberg Katalog) ---
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - protocol: TCP
          port: 9000

    # --- PostgreSQL (PostgreSQL-Katalog) ---
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432

    # --- Trino-interne Kommunikation (Coordinator ↔ Worker) ---
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: trino
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
{{- end }}
