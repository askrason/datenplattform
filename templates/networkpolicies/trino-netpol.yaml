{{- if .Values.networkPolicies.enabled }}
# ============================================================
# TICKET-006: Trino NetworkPolicy
# ============================================================
# Erlaubt minimale Pod-to-Pod-Kommunikation:
# - Ingress: Coordinator Port 8080 von Superset, Metabase, OpenMetadata, Airflow-Worker
# - Worker: Ingress nur vom Coordinator (Cluster-interne Kommunikation)
# - Egress: MinIO (9000), PostgreSQL (5432), DNS (53), Coordinator ↔ Worker
# ============================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-trino-netpol
  namespace: {{ .Values.namespaces.compute }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: trino
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: trino
  policyTypes:
    - Ingress
    - Egress

  # ============================================================
  # INGRESS: Wer darf mit Trino sprechen? (Cross-Namespace)
  # ============================================================
  ingress:
    # --- Superset (analytics/) → Trino ---
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.analytics }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: superset
      ports:
        - protocol: TCP
          port: 8080

    # --- Metabase (analytics/) → Trino ---
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.analytics }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: metabase
      ports:
        - protocol: TCP
          port: 8080

    # --- OpenMetadata (compute/) → Trino ---
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: openmetadata
      ports:
        - protocol: TCP
          port: 8080

    # --- Airflow (compute/) → Trino ---
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: airflow
      ports:
        - protocol: TCP
          port: 8080

    # --- Trino (compute/) internal Coordinator ↔ Worker ---
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: trino
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081

    # --- Ingress Controller (ingress/) ---
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.ingress }}
      ports:
        - protocol: TCP
          port: 8080

  # ============================================================
  # EGRESS: Wohin darf Trino verbindungen herstellen? (Cross-Namespace)
  # ============================================================
  egress:
    # --- DNS (Port 53) ---
    - to:
        - podSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- MinIO (data-storage/) - S3 / Hive / Iceberg Katalog ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.dataStorage }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - protocol: TCP
          port: 9000

    # --- PostgreSQL (data-storage/) - PostgreSQL-Katalog ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.dataStorage }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432

    # --- Keycloak (auth/) - OIDC Token Validation ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.auth }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 8080

    # --- Trino-interne Kommunikation (Coordinator ↔ Worker) ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: trino
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081

    # --- K8s API ---
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
{{- end }}
