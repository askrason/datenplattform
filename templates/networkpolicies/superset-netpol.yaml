{{- if .Values.networkPolicies.enabled }}
# ============================================================
# TICKET-008: Apache Superset NetworkPolicy
# ============================================================
# Superset Webserver + Celery Worker benötigen Zugriff auf:
# - Trino (Port 8080, SQL-Queries)
# - PostgreSQL (Port 5432, App-Metastore)
# - Redis (Port 6379, Celery Broker – intern)
# - Keycloak (Port 8080/8443, OIDC Token Validation)
# - DNS (Port 53)
#
# Ingress: Port 8088 vom Ingress Controller
# ============================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-superset-netpol
  namespace: {{ .Values.namespaces.analytics }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: superset
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: superset
  policyTypes:
    - Ingress
    - Egress

  # ============================================================
  # INGRESS: Wer darf mit Superset sprechen? (Cross-Namespace)
  # ============================================================
  ingress:
    # --- Ingress Controller (ingress/) → Superset UI/API ---
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.ingress }}
      ports:
        - protocol: TCP
          port: 8088

  # ============================================================
  # EGRESS: Wohin darf Superset verbindungen herstellen? (Cross-Namespace)
  # ============================================================
  egress:
    # --- DNS ---
    - to:
        - podSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- Trino (compute/) SQL-Queries ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: trino
      ports:
        - protocol: TCP
          port: 8080

    # --- PostgreSQL (data-storage/) App-Metastore ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.dataStorage }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432

    # --- Keycloak (auth/) OIDC Token Validation ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.auth }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443

    # --- Redis (analytics/) Celery Broker – intern ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.analytics }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379

    # --- K8s API ---
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

    # --- Keycloak (OIDC Token Validation) ---
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
{{- end }}
