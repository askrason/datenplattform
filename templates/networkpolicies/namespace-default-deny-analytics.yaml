{{- if .Values.networkPolicies.enabled }}
# NetworkPolicy: Default Deny for analytics/ namespace
# ============================================================
# Deny-by-default für analytics/ Namespace.
# Superset und Metabase erhalten explizite Allow-Rules.
#
# Erlaubte Eingangsverbindungen in analytics/:
#   - Superset (8088): Ingress Controller
#   - Metabase (3000): Ingress Controller
#
# TICKET-013-015: Multi-Namespace Refactor

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "data-platform.fullname" . }}-default-deny-analytics
  namespace: {{ .Values.namespaces.analytics }}
  labels:
    {{- include "data-platform.labels" . | nindent 4 }}
    component: analytics
    policy: default-deny

spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

  # Deny all ingress by default (explicit allows via component NetPols)
  ingress: []

  # Allow egress: K8s API, DNS only
  egress:
    # K8s API Server
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

    # DNS (Service Discovery)
    - to:
        - podSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
