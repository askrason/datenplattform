{{- if and .Values.vault.enabled .Values.networkPolicies.enabled }}
# NetworkPolicy: Vault
# ============================================================
# Vault läuft im vault/ Namespace und benötigt Zugriff auf:
#   - Port 8200: HTTP-API (von ESO im selben Namespace)
#   - Port 8201: Raft-Cluster-Kommunikation (intern zwischen Vault-Pods)
#   - K8s API Server: TokenReview für Kubernetes Auth
#
# TICKET-013-015: Multi-Namespace Refactor
# Namespace: vault/ (Day-1 secrets management)

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "data-platform.fullname" . }}-vault-netpol
  namespace: {{ .Values.namespaces.vault }}
  labels:
    {{- include "data-platform.labels" . | nindent 4 }}
    component: vault

spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault
      app.kubernetes.io/instance: {{ .Release.Name }}

  policyTypes:
    - Ingress
    - Egress

  # ============================================================
  # Ingress: Wer darf zu Vault verbinden?
  # ============================================================
  ingress:
    # --- Port 8200: HTTP API ---
    # Von External Secrets Operator
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: external-secrets
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 8200

    # Von Vault UI via Ingress (Ingress Controller → Vault)
    # Falls Ingress im selben Namespace läuft, nicht nötig.
    # Falls Ingress in eigenem Namespace: explizite Allow-Rule nötig.
    # Für jetzt: intern Vault nur von ESO erreichbar.

    # --- Port 8201: Raft Cluster Peer Communication ---
    # Von anderen Vault-Pods (HA-Cluster)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vault
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 8201

  # ============================================================
  # Egress: Wohin darf Vault verbinden?
  # ============================================================
  egress:
    # --- K8s API Server (TokenReview für Kubernetes Auth) ---
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

    # --- DNS (Service Discovery) ---
    - to:
        - podSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- Vault-interne Raft-Kommunikation (port 8201) ---
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vault
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 8201
{{- end }}
