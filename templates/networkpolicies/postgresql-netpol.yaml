{{- if and .Values.postgresql.enabled .Values.networkPolicies.enabled }}
# NetworkPolicy: PostgreSQL
# ============================================================
# PostgreSQL wird STRIKTE Zugriffskontrolle haben. Nur
# explizit definierte Services dürfen sich verbinden.
#
# TICKET-013-015: Multi-Namespace Refactor
# Namespace: data-storage/
#
# Erlaubte Ingress-Quellen auf Port 5432:
#   - Airflow (compute/)
#   - OpenMetadata (compute/)
#   - Superset (analytics/)
#   - Metabase (analytics/)
#   - Keycloak (auth/)
#   - Trino (compute/)
#   - Prometheus (monitoring/) – optional

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "data-platform.fullname" . }}-postgresql-netpol
  namespace: {{ .Values.namespaces.dataStorage }}
  labels:
    {{- include "data-platform.labels" . | nindent 4 }}
    component: postgresql

spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}

  policyTypes:
    - Ingress
    - Egress

  # ============================================================
  # Ingress: Wer darf zu PostgreSQL verbinden?
  # ============================================================
  ingress:
    # --- Port 5432: PostgreSQL Database (Cross-Namespace) ---

    # Airflow (compute/)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: airflow
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432

    # OpenMetadata (compute/)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: openmetadata
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432

    # Superset (analytics/)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.analytics }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: superset
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432

    # Metabase (analytics/)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.analytics }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: metabase
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432

    # Keycloak (auth/)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.auth }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432

    # Trino (compute/)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: trino
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432

    # Prometheus (monitoring/) – optional
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.monitoring }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9187

  # ============================================================
  # Egress: Wohin darf PostgreSQL verbinden?
  # ============================================================
  egress:
    # DNS (Service Discovery)
    - to:
        - podSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
