{{- if and .Values.postgresql.enabled .Values.networkPolicies.enabled }}
# NetworkPolicy: PostgreSQL
# ============================================================
# PostgreSQL wird STRIKTE Zugriffskontrolle haben. Nur
# explizit definierte Services dürfen sich verbinden.
#
# Erlaubte Ingress-Quellen auf Port 5432:
#   - Airflow (Scheduler, Webserver, Worker)
#   - OpenMetadata
#   - Superset
#   - Metabase
#   - Keycloak
#   - Trino (PostgreSQL Connector)
#   - Prometheus (Metrics auf Port 9187)

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "data-platform.fullname" . }}-postgresql-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "data-platform.labels" . | nindent 4 }}
    component: postgresql

spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}

  policyTypes:
    - Ingress
    - Egress

  # ============================================================
  # Ingress: Wer darf zu PostgreSQL verbinden?
  # ============================================================
  ingress:
    # --- Port 5432: PostgreSQL Database ---
    # Airflow (Metastore)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: airflow
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432

    # OpenMetadata (Metastore)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: openmetadata
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432

    # Superset (App-DB)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: superset
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432

    # Metabase (App-DB)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: metabase
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432

    # Keycloak (App-DB)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432

    # Trino (PostgreSQL Connector für Metadaten-Queries)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: trino
              app.kubernetes.io/instance: {{ .Release.Name }}
              component: coordinator
      ports:
        - protocol: TCP
          port: 5432

    # --- Port 9187: Prometheus Metrics ---
    # Prometheus Scraper (falls vorhanden)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9187

  # ============================================================
  # Egress: Wohin darf PostgreSQL verbinden?
  # ============================================================
  egress:
    # PostgreSQL antwortet auf DNS-Queries (Service Discovery)
    - to:
        - podSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
