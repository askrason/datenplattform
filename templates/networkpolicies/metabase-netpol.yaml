{{- if .Values.networkPolicies.enabled }}
# ============================================================
# TICKET-009: Metabase NetworkPolicy
# ============================================================
# Zwei Teile:
# 1. oauth2-proxy: Ingress von Ingress Controller (4180), Egress zu Metabase (3000) + Keycloak
# 2. Metabase: Ingress NUR von oauth2-proxy (3000), Egress zu Trino (8080) + PostgreSQL (5432)
# ============================================================

---
# ============================================================
# NetworkPolicy für oauth2-proxy
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-metabase-oauth2-proxy-netpol
  namespace: {{ .Values.namespaces.analytics }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: metabase-oauth2-proxy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: metabase-oauth2-proxy
  policyTypes:
    - Ingress
    - Egress

  # --- Ingress ---
  ingress:
    # Ingress Controller (ingress/) → oauth2-proxy
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.ingress }}
      ports:
        - protocol: TCP
          port: 4180

  # --- Egress ---
  egress:
    # DNS
    - to:
        - podSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Metabase (analytics/) upstream
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.analytics }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: metabase
      ports:
        - protocol: TCP
          port: 3000

    # Keycloak (auth/) OIDC Token Validation
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.auth }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443

    # K8s API
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

---
# ============================================================
# NetworkPolicy für Metabase
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-metabase-netpol
  namespace: {{ .Values.namespaces.analytics }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: metabase
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: metabase
  policyTypes:
    - Ingress
    - Egress

  # --- Ingress ---
  ingress:
    # oauth2-proxy (analytics/) → Metabase
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.analytics }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: metabase-oauth2-proxy
      ports:
        - protocol: TCP
          port: 3000

  # --- Egress ---
  egress:
    # DNS
    - to:
        - podSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Trino (compute/) SQL-Queries
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: trino
      ports:
        - protocol: TCP
          port: 8080

    # PostgreSQL (data-storage/) App-DB
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.dataStorage }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432

    # K8s API
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

{{- end }}
