{{- if and .Values.minio.enabled .Values.networkPolicies.enabled }}
# NetworkPolicy: MinIO
# ============================================================
# MinIO läuft im Distributed-Modus und wird über zwei Ports
# exponiert:
#   - Port 9000: S3-API (von Airflow, Trino, OpenMetadata aus compute/)
#   - Port 9001: Console/Web-UI (von Ingress Controller aus ingress/)
#
# TICKET-013-015: Multi-Namespace Refactor
# Namespace: data-storage/

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "data-platform.fullname" . }}-minio-netpol
  namespace: {{ .Values.namespaces.dataStorage }}
  labels:
    {{- include "data-platform.labels" . | nindent 4 }}
    component: minio

spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio
      app.kubernetes.io/instance: {{ .Release.Name }}

  policyTypes:
    - Ingress
    - Egress

  # ============================================================
  # Ingress: Wer darf zu MinIO verbinden?
  # ============================================================
  ingress:
    # --- Port 9000: S3 API (Cross-Namespace) ---

    # Airflow (compute/)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: airflow
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 9000

    # Trino (compute/)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: trino
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 9000

    # OpenMetadata (compute/)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: openmetadata
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 9000

    # --- Port 9001: MinIO Console (ingress/) ---
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.ingress }}
      ports:
        - protocol: TCP
          port: 9001

    # --- Inter-Pod Communication (Distributed Mode) ---
    # MinIO Pods kommunizieren untereinander auf Port 9000
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 9000

  # ============================================================
  # Egress: Wohin darf MinIO verbinden?
  # ============================================================
  egress:
    # DNS (Service Discovery)
    - to:
        - podSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Inter-Pod Communication (MinIO Cluster)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 9000
{{- end }}
