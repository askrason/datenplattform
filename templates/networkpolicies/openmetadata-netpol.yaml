{{- if .Values.networkPolicies.enabled }}
# ============================================================
# TICKET-007: OpenMetadata NetworkPolicy
# ============================================================
# OpenMetadata benötigt Zugriff auf:
# - PostgreSQL (Metastore, Port 5432)
# - Airflow (REST-API für Pipeline-Metadaten, Port 8080)
# - Trino (SQL-Metadaten crawlen, Port 8080)
# - MinIO (Storage-Metadaten crawlen, Port 9000)
# - Keycloak (OIDC, Port 8080/8443)
# - Elasticsearch (OM-intern, Port 9200)
# - DNS (Port 53)
#
# Ingress:
# - Port 8585 vom Ingress Controller (UI/API)
# - Port 8585 von Airflow-Scheduler (REST-API-Calls für Metadaten-Push)
# ============================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-openmetadata-netpol
  namespace: {{ .Values.namespaces.compute }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: openmetadata
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openmetadata
  policyTypes:
    - Ingress
    - Egress

  # ============================================================
  # INGRESS: Wer darf mit OpenMetadata sprechen? (Cross-Namespace)
  # ============================================================
  ingress:
    # --- Ingress Controller (ingress/) → OM UI/API ---
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.ingress }}
      ports:
        - protocol: TCP
          port: 8585

    # --- Airflow (compute/) → OM REST-API ---
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: airflow
      ports:
        - protocol: TCP
          port: 8585

  # ============================================================
  # EGRESS: Wohin darf OpenMetadata verbindungen herstellen? (Cross-Namespace)
  # ============================================================
  egress:
    # --- DNS ---
    - to:
        - podSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- PostgreSQL (data-storage/) ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.dataStorage }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432

    # --- Airflow (compute/) REST-API ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: airflow
      ports:
        - protocol: TCP
          port: 8080

    # --- Trino (compute/) SQL-Metadaten ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: trino
      ports:
        - protocol: TCP
          port: 8080

    # --- MinIO (data-storage/) Storage-Metadaten ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.dataStorage }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - protocol: TCP
          port: 9000

    # --- Keycloak (auth/) OIDC ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.auth }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443

    # --- Vault (vault/) für Secrets ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.vault }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: vault
      ports:
        - protocol: TCP
          port: 8200

    # --- Elasticsearch / OpenSearch (OM-intern für Search) ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespaces.compute }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: elasticsearch
      ports:
        - protocol: TCP
          port: 9200

    # --- K8s API ---
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
{{- end }}
