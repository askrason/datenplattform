{{- if and .Values.metabase.enabled .Values.keycloak.enabled }}
# ============================================================
# TICKET-009: Metabase Ingress (zeigt auf oauth2-proxy, nicht auf Metabase direkt)
# ============================================================
# Der Ingress leitet Requests an oauth2-proxy (Port 4180) weiter.
# oauth2-proxy authentifiziert über Keycloak und leitet an Metabase (intern) weiter.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-metabase
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: metabase
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: "metabase.{{ .Values.global.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # Zeigt auf oauth2-proxy Service, nicht auf Metabase!
                name: {{ .Release.Name }}-metabase-oauth2-proxy
                port:
                  number: 4180
  tls:
    - secretName: metabase-tls
      hosts:
        - "metabase.{{ .Values.global.domain }}"

{{- end }}
