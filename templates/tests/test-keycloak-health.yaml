{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test-keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  serviceAccountName: default
  securityContext:
    runAsNonRoot: true
    runAsUser: 999
  restartPolicy: Never
  containers:
    - name: keycloak-test
      image: curlimages/curl:8.1.0
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Testing Keycloak health..."
          curl -s http://{{ .Release.Name }}-keycloak:8080/health/ready | grep -q '"status":"UP"'
          echo "✓ Keycloak /health/ready returns UP"

          echo "Checking realm data-platform..."
          curl -s http://{{ .Release.Name }}-keycloak:8080/realms/data-platform | grep -q '"realm":"data-platform"'
          echo "✓ Realm data-platform exists"

          echo "All tests passed!"
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
{{- end }}
