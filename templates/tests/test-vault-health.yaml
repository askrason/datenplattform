{{- if .Values.vault.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test-vault
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  serviceAccountName: default
  securityContext:
    runAsNonRoot: true
    runAsUser: 999
  restartPolicy: Never
  containers:
    - name: vault-test
      image: curlimages/curl:8.1.0
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Testing Vault health..."
          curl -s http://{{ .Release.Name }}-vault:8200/v1/sys/health | grep -q '"initialized":true'
          echo "✓ Vault is initialized"

          curl -s http://{{ .Release.Name }}-vault:8200/v1/sys/health | grep -q '"sealed":false'
          echo "✓ Vault is unsealed"

          echo "All tests passed!"
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
{{- end }}
