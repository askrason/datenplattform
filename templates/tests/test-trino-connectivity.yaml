{{- if .Values.trino.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test-trino
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  serviceAccountName: default
  securityContext:
    runAsNonRoot: true
    runAsUser: 999
  restartPolicy: Never
  containers:
    - name: trino-test
      image: curlimages/curl:8.1.0
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Testing Trino connectivity..."
          curl -s -I http://{{ .Release.Name }}-trino:8080/ui/ | head -1 | grep -q "200\|301"
          echo "✓ Trino UI Port 8080 is reachable"
          
          echo "All tests passed!"
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
{{- end }}
