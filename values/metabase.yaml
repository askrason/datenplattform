# ============================================================
# TICKET-009: Metabase Sub-Chart
# ============================================================
# Metabase als ergänzendes Self-Service BI-Tool.
# ADR-004: oauth2-proxy als Sidecar-Deployment für Keycloak SSO,
# da Metabase OSS kein natives OIDC unterstützt.
#
# Chart-Repo: Community Chart (pmint93 oder ähnlich – siehe Chart.yaml TODO)
# Dokumentation: https://www.metabase.com/docs/
#
# Architektur:
#   Nutzer → Ingress → oauth2-proxy (Port 4180)
#                         ↓ OIDC/Keycloak (authentifiziert)
#                     Metabase (Port 3000, intern)
# ============================================================
# TICKET-013-015: Multi-Namespace Refactor
# Namespace: analytics (Superset + Metabase)

metabase:
  enabled: true

  # ============================================================
  # Security Context
  # ============================================================
  # AUSNAHME: readOnlyRootFilesystem: false
  # Grund: Metabase schreibt temporäre Dateien, Logs, H2-Fallback-DB
  # Mitigiert durch: emptyDir für /tmp, oauth2-proxy als Auth-Barrier

  podSecurityContext:
    runAsNonRoot: true
    fsGroupChangePolicy: OnRootMismatch
    runAsUser: 2000
    runAsGroup: 2000
    fsGroup: 2000

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault

  # ============================================================
  # Volumes für /tmp
  # ============================================================
  extraVolumes:
    - name: tmp
      emptyDir: {}

  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp

  # ============================================================
  # Ressourcen
  # ============================================================
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  # ============================================================
  # Datenbankverbindung (PostgreSQL `metabase` DB)
  # ============================================================
  # Metabase benötigt eine produktive DB (nicht H2!)
  database:
    type: postgres
    host: "{{ .Release.Name }}-postgresql"
    port: 5432
    dbname: metabase
    existingSecret: metabase-db-credentials
    existingSecretUsernameKey: username
    existingSecretPasswordKey: password

  # ============================================================
  # Service (intern, nur von oauth2-proxy erreichbar)
  # ============================================================
  service:
    type: ClusterIP
    port: 3000

  # ============================================================
  # Ingress (deaktiviert – läuft hinter oauth2-proxy)
  # ============================================================
  # oauth2-proxy ist der Ingress-Entry-Point.
  # Siehe templates/metabase-oauth2-proxy.yaml und templates/metabase-ingress.yaml
  ingress:
    enabled: false

  # ============================================================
  # Encryption Key (für Metabase-interne Datenverschlüsselung)
  # ============================================================
  extraEnv:
    - name: MB_ENCRYPTION_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: metabase-credentials
          key: encryption-key

  # ============================================================
  # Replicas
  # ============================================================
  replicaCount: 1

  # ============================================================
  # Trino-Konfiguration
  # ============================================================
  # Wird nach Deployment manuell in Metabase UI konfiguriert
  # oder via Metabase API (s. docs/metabase-setup.md)
