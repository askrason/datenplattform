# ============================================================
# EXTERNAL SECRETS OPERATOR (TICKET-004)
# ============================================================
# External Secrets Operator synchronisiert Secrets aus Vault
# zu K8s Secret-Objekten. Dies ist die Brücke zwischen
# Vault und den Applikationen.
#
# ESO läuft im selben Namespace wie die Data Platform und hat
# Zugriff auf Vault via Kubernetes Auth.

external-secrets:
  enabled: true

  # Installiere Custom Resource Definitions (SecretStore, ExternalSecret, etc.)
  installCRDs: true

  # ============================================================
  # ESO Operator Deployment
  # ============================================================
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroupChangePolicy: OnRootMismatch

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  # ============================================================
  # Webhook Controller (für ValidatingWebhook)
  # ============================================================
  webhook:
    podSecurityContext:
      runAsNonRoot: true
      fsGroupChangePolicy: OnRootMismatch

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault

  # ============================================================
  # Cert Controller (für TLS-Zertifikate des Webhooks)
  # ============================================================
  certController:
    podSecurityContext:
      runAsNonRoot: true
      fsGroupChangePolicy: OnRootMismatch

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
