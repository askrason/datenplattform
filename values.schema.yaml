# values.schema.yaml – Helm Chart Validierungsschema
# Dieses Schema validiert die Eingabewerte gegen definierte Constraints.
# Helm 3.x nutzt JSON-Schema (dieses File wird als YAML geschrieben, ist aber
# JSON-Schema-kompatibel).
#
# HINWEIS: Das Schema wird nicht automatisch per `helm lint` validiert;
# manuelle Validierung erfolgt z.B. via:
#   helm template . | helm lint - --values values.yaml

$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  global:
    type: object
    properties:
      domain:
        type: string
        minLength: 1
        description: "Domain für Ingress-Hosts (z.B. data-platform.example.com)"
      storageClass:
        type: string
        minLength: 1
        description: "K8s StorageClass mit ReadWriteOnce-Support"
      imageRegistry:
        type: string
        description: "Container Registry URL"
      imagePullPolicy:
        type: string
        enum: ["IfNotPresent", "Always", "Never"]
      imagePullSecrets:
        type: array
        description: "K8s Secret-Namen für Private-Registry-Zugriff"
      namespaceSuffix:
        type: string
        description: "Suffix für Namespace-Namen (z.B. '-prod')"
    required: [domain, storageClass]

  vault:
    type: object
    properties:
      enabled:
        type: boolean

  external-secrets:
    type: object
    properties:
      enabled:
        type: boolean

  postgresql:
    type: object
    properties:
      enabled:
        type: boolean
      architecture:
        type: string
        enum: ["standalone", "replication"]
      primary:
        type: object
        properties:
          resources:
            type: object
            properties:
              requests:
                type: object
                properties:
                  cpu:
                    type: string
                    pattern: "^[0-9]+m?$"
                  memory:
                    type: string
                    pattern: "^[0-9]+(Mi|Gi|M|G)$"
                required: [cpu, memory]
              limits:
                type: object
                properties:
                  cpu:
                    type: string
                    pattern: "^[0-9]+m?$"
                  memory:
                    type: string
                    pattern: "^[0-9]+(Mi|Gi|M|G)$"
                required: [cpu, memory]
            required: [requests, limits]

  minio:
    type: object
    properties:
      enabled:
        type: boolean
      mode:
        type: string
        enum: ["standalone", "distributed"]
      replicas:
        type: integer
        minimum: 1
      resources:
        type: object
        properties:
          requests:
            type: object
            properties:
              cpu:
                type: string
                pattern: "^[0-9]+m?$"
              memory:
                type: string
                pattern: "^[0-9]+(Mi|Gi|M|G)$"
            required: [cpu, memory]
          limits:
            type: object
            properties:
              cpu:
                type: string
                pattern: "^[0-9]+m?$"
              memory:
                type: string
                pattern: "^[0-9]+(Mi|Gi|M|G)$"
            required: [cpu, memory]
        required: [requests, limits]

  keycloak:
    type: object
    properties:
      enabled:
        type: boolean

  airflow:
    type: object
    properties:
      enabled:
        type: boolean
      executor:
        type: string
        enum: ["KubernetesExecutor", "LocalExecutor", "CeleryExecutor"]

  trino:
    type: object
    properties:
      enabled:
        type: boolean
      server:
        type: object
        properties:
          workers:
            type: integer
            minimum: 1

  openmetadata:
    type: object
    properties:
      enabled:
        type: boolean

  superset:
    type: object
    properties:
      enabled:
        type: boolean

  metabase:
    type: object
    properties:
      enabled:
        type: boolean

required:
  - global
  - vault
  - external-secrets
  - postgresql
  - minio
  - keycloak
  - airflow
  - trino
  - openmetadata
  - superset
  - metabase
